name: Keep Streamlit App Awake

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  wake-app:
    runs-on: ubuntu-latest
    steps:
      - name: Wake Streamlit app
        uses: actions/github-script@v7
        with:
          script: |
            const https = require('https');
            const url = 'https://somalia-dashboard-ngeyxusdcd9jjtvsi4bh5a.streamlit.app/';
            
            await new Promise((resolve, reject) => {
              https.get(url, (res) => {
                console.log(`Status: ${res.statusCode}`);
                console.log('App pinged successfully');
                resolve();
              }).on('error', reject);
            });
